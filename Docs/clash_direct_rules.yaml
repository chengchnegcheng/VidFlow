- PROCESS-NAME,msedgewebview2.exe,DIRECT
- PROCESS-NAME,WeChatApp.exe,DIRECT
- PROCESS-NAME,WeChatBrowser.exe,DIRECT
- PROCESS-NAME,WeChatPlayer.exe,DIRECT
- PROCESS-NAME,Weixin.exe,DIRECT
- PROCESS-NAME,WXWork.exe,DIRECT


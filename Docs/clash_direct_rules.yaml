# VidFlow 微信视频号下载 - Clash 直连规则
# 
# 使用方法：
# 1. 打开 Clash Verge / Clash for Windows
# 2. 进入"规则"或"Rules"设置
# 3. 将以下规则添加到规则列表的最前面
#
# 注意：这些规则需要放在 MATCH 规则之前


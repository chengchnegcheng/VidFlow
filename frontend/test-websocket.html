<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidFlow WebSocket 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .test-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-time {
            color: #858585;
        }
        .log-success {
            color: #4ec9b0;
        }
        .log-error {
            color: #f48771;
        }
        .log-info {
            color: #9cdcfe;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 VidFlow WebSocket 实时测试</h1>
        <p class="subtitle">测试工具安装进度实时推送功能</p>

        <!-- 连接状态 -->
        <div class="test-section">
            <h2>📡 连接状态</h2>
            <span id="status" class="status disconnected">未连接</span>
            <div style="margin-top: 15px;">
                <button id="connectBtn" onclick="connect()">连接 WebSocket</button>
                <button id="disconnectBtn" onclick="disconnect()" disabled>断开连接</button>
            </div>
        </div>

        <!-- 模拟工具安装 -->
        <div class="test-section">
            <h2>🔧 模拟工具安装测试</h2>
            <button onclick="testFFmpegInstall()">测试 FFmpeg 安装</button>
            <button onclick="testYtdlpInstall()">测试 yt-dlp 安装</button>
            <button onclick="testWhisperInstall()">测试 Whisper 安装</button>
            
            <div id="progress-container" style="margin-top: 15px; display: none;">
                <div><strong id="current-tool">当前工具：无</strong></div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%">0%</div>
                </div>
                <div style="margin-top: 10px; color: #666;" id="progress-message">等待中...</div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="test-section">
            <h2>📊 统计信息</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="msgCount">0</div>
                    <div class="stat-label">接收消息数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="progressUpdates">0</div>
                    <div class="stat-label">进度更新</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uptime">0s</div>
                    <div class="stat-label">连接时长</div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="test-section">
            <h2>📝 实时日志</h2>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let messageCount = 0;
        let progressCount = 0;
        let connectTime = null;
        let uptimeInterval = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusEl = document.getElementById('status');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            
            if (connected) {
                statusEl.textContent = '已连接';
                statusEl.className = 'status connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                statusEl.textContent = '未连接';
                statusEl.className = 'status disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        function connect() {
            const wsUrl = 'ws://localhost:11434/api/v1/system/ws';
            log(`正在连接 ${wsUrl}...`, 'info');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                log('✅ WebSocket 连接成功！', 'success');
                updateStatus(true);
                connectTime = Date.now();
                startUptimeCounter();
            };
            
            ws.onmessage = (event) => {
                messageCount++;
                document.getElementById('msgCount').textContent = messageCount;
                
                try {
                    const data = JSON.parse(event.data);
                    log(`📨 收到消息: ${JSON.stringify(data)}`, 'info');
                    
                    if (data.type === 'tool_install_progress') {
                        progressCount++;
                        document.getElementById('progressUpdates').textContent = progressCount;
                        updateProgress(data.tool_id, data.progress, data.message);
                    }
                } catch (e) {
                    log(`⚠️ 解析消息失败: ${e.message}`, 'error');
                }
            };
            
            ws.onerror = (error) => {
                log(`❌ WebSocket 错误: ${error}`, 'error');
            };
            
            ws.onclose = () => {
                log('🔌 WebSocket 连接已关闭', 'info');
                updateStatus(false);
                stopUptimeCounter();
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function updateProgress(toolId, progress, message) {
            const container = document.getElementById('progress-container');
            const toolEl = document.getElementById('current-tool');
            const fillEl = document.getElementById('progress-fill');
            const msgEl = document.getElementById('progress-message');
            
            container.style.display = 'block';
            toolEl.textContent = `当前工具：${toolId}`;
            fillEl.style.width = `${progress}%`;
            fillEl.textContent = `${progress}%`;
            msgEl.textContent = message;
            
            log(`🔄 ${toolId}: ${progress}% - ${message}`, 'success');
        }

        async function testFFmpegInstall() {
            log('🔧 开始测试 FFmpeg 安装...', 'info');
            try {
                const response = await fetch('http://localhost:11434/api/v1/system/tools/install/ffmpeg', {
                    method: 'POST'
                });
                const data = await response.json();
                log(`✅ FFmpeg 安装响应: ${JSON.stringify(data)}`, 'success');
            } catch (e) {
                log(`❌ FFmpeg 安装失败: ${e.message}`, 'error');
            }
        }

        async function testYtdlpInstall() {
            log('🔧 开始测试 yt-dlp 安装...', 'info');
            try {
                const response = await fetch('http://localhost:11434/api/v1/system/tools/install/ytdlp', {
                    method: 'POST'
                });
                const data = await response.json();
                log(`✅ yt-dlp 安装响应: ${JSON.stringify(data)}`, 'success');
            } catch (e) {
                log(`❌ yt-dlp 安装失败: ${e.message}`, 'error');
            }
        }

        async function testWhisperInstall() {
            log('🔧 开始测试 Whisper 安装...', 'info');
            try {
                const response = await fetch('http://localhost:11434/api/v1/system/tools/install/whisper', {
                    method: 'POST'
                });
                const data = await response.json();
                log(`✅ Whisper 安装响应: ${JSON.stringify(data)}`, 'success');
            } catch (e) {
                log(`❌ Whisper 安装失败: ${e.message}`, 'error');
            }
        }

        function startUptimeCounter() {
            uptimeInterval = setInterval(() => {
                if (connectTime) {
                    const uptime = Math.floor((Date.now() - connectTime) / 1000);
                    document.getElementById('uptime').textContent = `${uptime}s`;
                }
            }, 1000);
        }

        function stopUptimeCounter() {
            if (uptimeInterval) {
                clearInterval(uptimeInterval);
                uptimeInterval = null;
            }
        }

        // 页面加载时自动连接
        window.addEventListener('load', () => {
            log('🎯 WebSocket 测试页面已加载', 'info');
            log('💡 点击"连接 WebSocket"按钮开始测试', 'info');
        });
    </script>
</body>
</html>

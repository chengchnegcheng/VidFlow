[pytest]
# Pytest 配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    -v
    --strict-markers
    --tb=short
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-branch

# 异步测试支持
asyncio_mode = auto

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API 测试
    core: 核心功能测试
    network: 需要网络连接的测试
    download: 下载相关测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

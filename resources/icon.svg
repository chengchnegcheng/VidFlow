<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.14" />
      <stop offset="35%" style="stop-color:#ffffff;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 - 深灰色 -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#gradient)" filter="url(#shadow)"/>
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#highlight)"/>
  
  <!-- 主要图标元素 - 下载箭头 -->
  <g transform="translate(128, 128)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="-34" r="40" fill="white" fill-opacity="0.12" stroke-width="14" stroke-opacity="0.95"/>
    <path d="M -12 -50 L -12 -18 L 16 -34 Z" fill="white" stroke="none"/>
    <!-- 箭头主体 -->
    <path d="M 0 6 L 0 54" stroke-width="20"/>
    
    <!-- 箭头头部 -->
    <path d="M -34 54 L 0 86 L 34 54" stroke-width="20"/>
    
    <!-- 底部线条表示下载完成 -->
    <rect x="-44" y="100" width="88" height="8" fill="white" stroke="none" rx="4" opacity="0.65"/>
  </g>
  
  <!-- 装饰性元素 - 简约线条 -->
  <g opacity="0.4">
    <!-- 左侧数据流线条 -->
    <rect x="50" y="90" width="20" height="2" fill="white" rx="1"/>
    <rect x="50" y="100" width="30" height="2" fill="white" rx="1"/>
    <rect x="50" y="110" width="25" height="2" fill="white" rx="1"/>
    
    <!-- 右侧数据流线条 -->
    <rect x="186" y="150" width="20" height="2" fill="white" rx="1"/>
    <rect x="176" y="160" width="30" height="2" fill="white" rx="1"/>
    <rect x="181" y="170" width="25" height="2" fill="white" rx="1"/>
  </g>
  
  <!-- 边框装饰 -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>